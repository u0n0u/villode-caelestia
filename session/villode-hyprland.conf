# Villode Hyprland session
# This file is intentionally self-contained and does not source ~/.config/hypr.

monitor = , preferred, auto, 1

$mod = SUPER
$terminal = villode-terminal
$files = villode-explorer

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = GTK_THEME,Caelestia-Dark:dark
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Villode-Hyprland
# Chinese input (fcitx5) — also written to ~/.config/environment.d by installer
# Do NOT set GTK_IM_MODULE on Wayland; GTK should use text-input-v3.
# See: https://fcitx-im.org/wiki/Using_Fcitx_5_on_Wayland
env = QT_IM_MODULE,fcitx
env = QT_IM_MODULES,wayland;fcitx;ibus
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx

# Do NOT use --all: it re-exports stale GTK_IM_MODULE from the compositor process.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE XDG_SESSION_ID DISPLAY
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = sh -lc 'for agent in /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 /usr/lib/polkit-kde-authentication-agent-1; do test -x "$agent" && exec "$agent"; done'
# Guard restarts Caelestia if Quickshell crashes/exits (exec-once alone does not).
exec-once = villode-caelestia-shell-guard --daemon
exec-once = villode-desktop --daemon
exec-once = villode-launcher --daemon
exec-once = villode-dock --daemon
exec-once = villode-screenshot-editor --daemon
exec-once = sh -lc 'command -v fcitx5 >/dev/null && env -u GTK_IM_MODULE fcitx5 -d --replace || true'

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        tap-to-click = yes
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = yes
}

decoration {
    rounding = 12
    active_opacity = 1
    inactive_opacity = 0.96
    blur {
        enabled = yes
        size = 10
        passes = 3
        new_optimizations = yes
        ignore_opacity = true
        xray = false
        popups = true
        noise = 0.02
        contrast = 0.9
        brightness = 1.0
        vibrancy = 0.15
    }
}

animations {
    enabled = yes
    bezier = villode, 0.22, 1, 0.36, 1
    animation = windows, 1, 5, villode
    animation = windowsOut, 1, 4, default, popin 80%
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, villode, slide
}

misc {
    disable_hyprland_logo = yes
    disable_splash_rendering = yes
    force_default_wallpaper = 0
}

bind = $mod, Return, exec, $terminal
bind = $mod, E, exec, $files
bind = $mod, D, exec, villode-launcher
bind = $mod SHIFT, D, exec, villode-desktop --toggle
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod SHIFT, M, exit

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

windowrule = match:class ^(local.villode.launcher)$, float on
windowrule = match:class ^(local.villode.launcher)$, center on
windowrule = match:class ^(local.villode.launcher)$, size 900 600
windowrule = match:class ^(local.villode.launcher)$, rounding 20

# Villode screenshot editor — fullscreen floating overlay
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, float on
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, pin on
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, size 100% 100%
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, move 0 0
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, border_size 0
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, rounding 0
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, no_shadow on
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, no_anim on
windowrule = match:class ^(local\.villode\.screenshot\.editor.*)$, decorate off


layerrule = blur true, match:namespace villode-dock
layerrule = ignore_alpha 0.12, match:namespace villode-dock
layerrule = xray false, match:namespace villode-dock

# Screenshot (Print). Keep static binds as fallback — ShortcutBindings also applies at shell start.
# Use both regular and locked binds so capture works even if a layer steals focus.
bind = , Print, global, caelestia:screenshot
bindl = , Print, global, caelestia:screenshot
# Common laptop variants